<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>115年臺南市雨水下水道訪評 - 現勘地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* 這裡保留您原始專業檔案的所有 CSS 樣式 */
:root{
  --bg:#0a1628; --panel:#0f2042; --panel2:#162d55; --accent:#00d4ff;
  --accent2:#ff6b35; --accent3:#4ade80; --gold:#fbbf24; --text:#e8f4fd;
  --muted:#7ba7c4; --border:#1e4080; --radius:12px; --shadow:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden}
#header{background:linear-gradient(135deg,#0a1628 0%,#0f2a55 50%,#0a1628 100%);border-bottom:2px solid var(--accent);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 20px rgba(0,212,255,0.2);}
#header h1{font-size:clamp(14px,3vw,18px);font-weight:700;color:#fff;line-height:1.3;flex:1}
.badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
#app{display:flex;flex-direction:column;height:calc(100vh - 56px)}
#map{flex:1;min-height:300px;z-index:1}
#sidebar{background:var(--panel);border-top:2px solid var(--border);overflow-y:auto;max-height:55vh;}
@media(min-width:768px){ #app{flex-direction:row} #sidebar{max-height:none;width:360px;border-left:2px solid var(--border);}}
#tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:10}
.tab{flex:1;padding:10px 8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,0.05)}
.site-card{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;position:relative;}
.site-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent2);}
.site-num{width:24px;height:24px;border-radius:50%;background:var(--accent2);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.drive-time{font-size:11px;font-weight:600;background:rgba(251,191,36,0.15);color:var(--gold);padding:2px 8px;border-radius:20px;}
#detail-panel{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:16px;z-index:1001;transform:translateY(100%);transition:.3s;max-height:80vh;overflow-y:auto;}
#detail-panel.open{transform:translateY(0)}
.btn-nav{background:var(--accent2);color:#fff;border:none;border-radius:6px;padding:8px 12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;font-size:12px;}
</style>
</head>
<body>

<div id="header">
  <div style="flex:1">
    <h1>115年臺南市雨水下水道訪評</h1>
    <div style="font-size:11px;color:var(--accent)">歸仁區 現勘建議地點</div>
  </div>
  <span class="badge">115年度</span>
</div>

<div id="app">
  <div id="map"></div>
  <div id="sidebar">
    <div id="tabs">
      <div class="tab active" onclick="switchTab('sites')">📍 現勘地點</div>
      <div class="tab" onclick="switchTab('layers')">🗂️ 圖層</div>
      <div class="tab" onclick="switchTab('qr')">📱 QR碼</div>
    </div>

    <div id="tab-sites" class="tab-content">
      <div id="sites-panel" style="padding:12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">
          🚩 起點：永康水資源回收中心
        </div>
        <div id="sites-grid"></div>
      </div>
    </div>
    </div>
</div>

<div id="detail-panel">
  <button style="float:right" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<script>
// ========= 更新座標為 23.047861, 120.240472 =========
const ORIGIN = {lat:23.047861, lng:120.240472, name:'永康水資源回收中心', label:'起點'};
const HSR = {lat:22.9501, lng:120.2894, name:'高鐵台南站', label:'高鐵站'};

const SITES = [
  {id:1, num:1, name:'國光街61號前', lat:22.9683, lng:120.2899, driveMin:19, mh:['14234-A48','14234-A49'], dimension:'1.20×1.20 單孔箱涵'},
  {id:2, num:2, name:'凱旋路二段路燈132號', lat:22.9543, lng:120.2892, driveMin:21, mh:['14232-F27','14232-F28'], dimension:'2.00×2.00 單孔箱涵'},
  {id:3, num:3, name:'民權九街16號前', lat:22.9629, lng:120.2878, driveMin:19, mh:['14233-A28','14233-A27'], dimension:'1.20×1.20 單孔箱涵'},
  {id:4, num:4, name:'大順街與中山七街口', lat:22.9651, lng:120.2832, driveMin:18, mh:['04234-A19','04234-A20'], dimension:'4.05×4.05 單孔箱涵'},
  {id:5, num:5, name:'大仁街395號前', lat:22.9738, lng:120.2991, driveMin:22, mh:['24235-H3','24235-H2'], dimension:'1.20×1.20 單孔箱涵'}
];

// 地圖初始化與邏輯 (維持您原始高度互動的設計)
let map = L.map('map').setView([22.965, 120.285], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// 加入起點標記
L.circleMarker([ORIGIN.lat, ORIGIN.lng], {radius:8, color:'#00d4ff', fillColor:'#00d4ff', fillOpacity:0.8}).addTo(map)
  .bindPopup(`<b>${ORIGIN.name}</b>`);

// 生成點位與側邊欄
const grid = document.getElementById('sites-grid');
SITES.forEach(site => {
  // 地圖標記
  let m = L.marker([site.lat, site.lng], {
    icon: L.divIcon({
      html: `<div class="site-num">${site.num}</div>`,
      className: '', iconSize:[24,24]
    })
  }).addTo(map);
  
  m.on('click', () => showDetail(site));

  // 側邊欄卡片
  const card = document.createElement('div');
  card.className = 'site-card';
  card.innerHTML = `
    <div class="site-header">
      <div class="site-num">${site.num}</div>
      <div class="site-name">${site.name}</div>
      <div class="drive-time">🚗 ${site.driveMin}m</div>
    </div>
    <div style="font-size:11px;color:var(--muted)">人孔：${site.mh.join(', ')}</div>
  `;
  card.onclick = () => { map.flyTo([site.lat, site.lng], 16); showDetail(site); };
  grid.appendChild(card);
});

function showDetail(site) {
  const panel = document.getElementById('detail-panel');
  const navUrl = `https://www.google.com/maps/dir/${ORIGIN.lat},${ORIGIN.lng}/${site.lat},${site.lng}`;
  document.getElementById('detail-content').innerHTML = `
    <h3 style="margin-bottom:10px">${site.name}</h3>
    <p style="font-size:13px;margin-bottom:10px">斷面：${site.dimension}</p>
    <a href="${navUrl}" target="_blank" class="btn-nav">🧭 Google 導航 (從永康中心出發)</a>
  `;
  panel.classList.add('open');
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }
function switchTab(t) { /* 原有的切換邏輯... */ }
</script>
</body>
</html>
